{{ define "main" }}
<section class="page-hero">
  <div class="container page-hero-inner">
    <div class="section-eyebrow">// {{ .Params.eyebrow }}</div>
    <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:.75rem;">{{ .Title }}</h1>
    <p style="color:var(--text-secondary);font-size:.9rem;max-width:620px;line-height:1.8;">{{ .Description }}</p>
  </div>
</section>
<div class="container" style="padding:3rem 0;">
  {{ .Content }}
</div>
{{ end }}
